<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f1e7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0e14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,30..100&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300..700;1,300..600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,30..100&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300..700;1,300..600&display=swap"
      />
    </noscript>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e14'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23e89a2a' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23e89a2a'/%3E%3Cpath d='M16 4 L16 7 M16 25 L16 28 M4 16 L7 16 M25 16 L28 16' stroke='%23e89a2a' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <title>SatHop · Mission Console</title>
    <script>
      // Apply persisted theme before paint to avoid FOUC.
      (function () {
        try {
          var k = "sathop.theme";
          var v = localStorage.getItem(k) || "dark";
          if (v === "system") {
            v = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.classList.toggle("dark", v === "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
