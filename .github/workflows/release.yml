name: Release images

# Builds and pushes the three component images to GHCR. Runs on:
#   - tag push matching v*    → versioned release (e.g. v1.2.3)
#   - main branch push         → rolling :main + :sha-<short> tags
#   - workflow_dispatch        → manual one-off (useful for testing)
#
# Image names: ghcr.io/<owner>/sathop/{orchestrator,worker,receiver}
# Multi-arch: linux/amd64 + linux/arm64 via QEMU + buildx.
# Cache: GitHub Actions cache (gha) — first build cold, subsequent builds reuse layers.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        component: [orchestrator, worker, receiver]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build web/dist/ once for the orchestrator image. Worker/receiver don't
      # need it; the Dockerfile's COPY skips the directory if it doesn't exist.
      - uses: actions/setup-node@v6
        if: matrix.component == 'orchestrator'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        if: matrix.component == 'orchestrator'
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          # Tag policy:
          #   - tag push v1.2.3 → :1.2.3, :1.2, :latest
          #   - main push       → :main, :sha-<short>
          #   - dispatch        → :sha-<short>
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/${{ matrix.component }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
