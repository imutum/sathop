services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${SATHOP_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${SATHOP_MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./minio-data:/data

  aria2c:
    image: p3terx/aria2-pro:latest
    restart: unless-stopped
    environment:
      RPC_SECRET: ${SATHOP_ARIA2_SECRET}
      RPC_PORT: 6800
    volumes:
      - ./aria2-conf:/config
      - ./aria2-downloads:/downloads

  worker:
    image: ${SATHOP_IMAGE:-ghcr.io/imutum/sathop}/worker:${SATHOP_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on: [minio, aria2c]
    volumes:
      - ./data:/app/data
      - ./aria2-downloads:/downloads
